# /etc/nginx/sites-available/kiro (style certbot / sites-enabled)
# Template: API tren mot domain + admin panel tren SUBDOMAIN rieng.
#   xapi.your-domain.com  -> toan bo app (API /v1/*, panel van o <ADMIN_PATH>)
#   admin.your-domain.com -> re-map / thanh <ADMIN_PATH>/ (xem DEPLOYMENT.md muc 5.1)
#
# Truoc khi dung, thay 3 cho:
#   1. xapi.your-domain.com / admin.your-domain.com -> domain that
#   2. /panel-x7k9/ -> dung gia tri ADMIN_PATH trong .env (GIU dau "/" cuoi!)
#   3. 127.0.0.1:8085 -> dung port publish cua container
#
# QUAN TRONG (xem DEPLOYMENT.md muc 5.2 / deploy/HARDENING.md):
#   - .env: KIRO_TRUST_PROXY=true, KIRO_TRUSTED_PROXY_HOPS=1 (them Cloudflare truoc nginx: 2)
#   - docker-compose.yml: publish port ve loopback "127.0.0.1:8085:8080"
#
# Cert: chay certbot cho ca hai domain, no tu dien cac dong ssl_* :
#   sudo certbot --nginx -d xapi.your-domain.com -d admin.your-domain.com

limit_req_zone $binary_remote_addr zone=kiro_go_limit:10m rate=10r/s;

# ---------- API: xapi.your-domain.com ----------
server {
    server_name xapi.your-domain.com;
    listen 443 ssl;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server_tokens off;
    # Khop voi payload cap ~2MB cua app, du du phong
    client_max_body_size 10m;

    # Chan scanner mo cac path nhay cam
    location ~ /\.(env|git|ssh|docker|config|php|sql|bak) {
        access_log off;
        log_not_found off;
        return 444;
    }

    location / {
        limit_req zone=kiro_go_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE streaming cho LLM — bat buoc khong buffer.
        # KHONG set Upgrade/Connection "upgrade": app chi dung SSE, khong co
        # WebSocket; hardcode "Connection: upgrade" pha keepalive nginx<->app.
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;

        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        # Timeout giua 2 lan doc tu upstream (khong phai tong thoi gian stream)
        proxy_read_timeout 600s;
    }
}

# ---------- Admin panel: admin.your-domain.com ----------
server {
    server_name admin.your-domain.com;
    listen 443 ssl;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server_tokens off;
    client_max_body_size 10m;

    location / {
        # Dau "/" cuoi o proxy_pass la BAT BUOC: nginx rewrite /xyz -> <ADMIN_PATH>/xyz.
        # Tro bare path (khong slash) se dinh redirect cua app -> lo secret path
        # ra browser va dua user ve duong dan sai tren subdomain.
        proxy_pass http://127.0.0.1:8085/panel-x7k9/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE log stream cua panel (EventSource)
        proxy_buffering off;
        proxy_cache off;
        proxy_http_version 1.1;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    # Khong gan limit_req: panel chi minh operator dung, load nhieu request song
    # song luc mo trang; da co password + secret path + (tuy chon) Cloudflare Access.
}

# ---------- HTTP -> HTTPS ----------
server {
    listen 80;
    server_name xapi.your-domain.com admin.your-domain.com;
    return 301 https://$host$request_uri;
}
