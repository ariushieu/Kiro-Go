services:
  kiro-go:
    build: .
    ports:
      - "8080:8080"
      - "3128:3128"
      - "4649:4649"
      - "6588:6588"
      - "8008:8008"
      - "9091:9091"
    volumes:
      - ./data:/app/data
    environment:
      - CONFIG_PATH=/app/data/config.json
      - LOOPBACK_HOST=0.0.0.0
      # Các biến dưới đây nạp từ file .env cạnh docker-compose.yml (compose tự đọc).
      # Xem .env.example — copy thành .env rồi điền giá trị. Để trống = dùng mặc định.
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_PATH=${ADMIN_PATH:-}
      - LOG_LEVEL=${LOG_LEVEL:-}
      # BẮT BUỘC khi đứng sau reverse proxy / Cloudflare — xem DEPLOYMENT.md §5.2.
      # Để trống = mặc định (không trust proxy, lấy IP từ RemoteAddr).
      - KIRO_TRUST_PROXY=${KIRO_TRUST_PROXY:-}
      - KIRO_TRUSTED_PROXY_HOPS=${KIRO_TRUSTED_PROXY_HOPS:-}
    restart: unless-stopped
