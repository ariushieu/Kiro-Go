services:
  kiro-go:
    build: .
    ports:
      - "8080:8080"
      - "3128:3128"
      - "4649:4649"
      - "6588:6588"
      - "8008:8008"
      - "9091:9091"
    volumes:
      - ./data:/app/data
    environment:
      - CONFIG_PATH=/app/data/config.json
      - LOOPBACK_HOST=0.0.0.0
    restart: unless-stopped
